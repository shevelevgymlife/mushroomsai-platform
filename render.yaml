services:
  - type: web
    name: mushroomsai
    env: python
    # 3.11.0 на Render часто недоступен → failed build; см. https://render.com/docs/python-version
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: TELEGRAM_ENABLED
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SHEVELEV_TOKEN_ADDRESS
        sync: false

databases:
  - name: mushroomsai-db
    databaseName: mushroomsai
    user: mushroomsai
