services:
  - type: web
    name: mushroomsai
    # Поле env: устарело в Blueprint; runtime — рекомендуемый вариант (render.com/docs/blueprint-spec).
    runtime: python
    # 3.11.0 на Render часто недоступен → failed build; см. https://render.com/docs/python-version
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    # healthCheckPath в blueprint не задаём: пока идёт lifespan (БД + миграции), приложение
    # не отвечает HTTP; проверка /health с таймаутом ~5s даёт срыв zero-downtime deploy.
    # При необходимости задайте Health Check Path вручную в Dashboard после стабильного старта.
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SHEVELEV_TOKEN_ADDRESS
        sync: false

databases:
  - name: mushroomsai-db
    databaseName: mushroomsai
    user: mushroomsai
