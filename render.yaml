services:
  - type: web
    name: mushroomsai
    env: python
    # 3.11.0 на Render часто недоступен → failed build; см. https://render.com/docs/python-version
    # --no-cache-dir: меньше диска/RAM на билде (частые OOM на free/starter).
    buildCommand: pip install --upgrade pip setuptools wheel && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    # healthCheckPath не задаём в Blueprint: при расхождении с уже созданным сервисом или ZDT
    # деплой иногда «Deploy failed» без явной ошибки в коде. В Dashboard → Settings задайте вручную:
    # Health Check Path = /health (приложение отдаёт JSON сразу после подключения к БД).
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SHEVELEV_TOKEN_ADDRESS
        sync: false

databases:
  - name: mushroomsai-db
    databaseName: mushroomsai
    user: mushroomsai
