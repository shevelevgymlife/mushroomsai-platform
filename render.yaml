services:
  - type: web
    name: mushroomsai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SHEVELEV_TOKEN_ADDRESS
        sync: false

databases:
  - name: mushroomsai-db
    databaseName: mushroomsai
    user: mushroomsai
