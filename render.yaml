services:
  - type: web
    name: mushroomsai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: mushroomsai-db
    databaseName: mushroomsai
    user: mushroomsai
