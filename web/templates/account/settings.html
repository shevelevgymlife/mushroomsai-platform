{% extends "base.html" %}
{% block title %}Настройки — NEUROFUNGI AI{% endblock %}
{% block extra_head %}
<style>
.s-wrap { max-width: 520px; margin: 0 auto; padding: 16px 14px calc(80px + env(safe-area-inset-bottom,0px)); }
.s-wrap h1 { font-size: clamp(18px,4.5vw,22px); font-weight: 700; color: #e8e8e8; margin: 8px 0 20px; }
.s-section { margin-bottom: 28px; }
.s-section-title { font-size: 13px; font-weight: 600; color: #C9A84C; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; padding: 0 2px; }
.s-card { background: #111; border: 1px solid rgba(255,255,255,.07); border-radius: 14px; overflow: hidden; margin-bottom: 8px; }
.s-link { display: flex; align-items: center; justify-content: space-between; padding: 15px 16px; text-decoration: none; color: #ddd; font-size: 14px; font-weight: 500; transition: background .15s; }
.s-link:hover { background: rgba(255,255,255,.04); }
.s-link .s-arr { color: #555; font-size: 16px; }
</style>
{% endblock %}

{% block content %}
<div class="s-wrap">
  <h1>Настройки</h1>

  <div class="s-section">
    <div class="s-section-title">Профиль</div>
    <div class="s-card">
      <a href="/account/profile-edit" class="s-link">Редактировать профиль <span class="s-arr">›</span></a>
      <a href="/account/style" class="s-link">Настройка стиля <span class="s-arr">›</span></a>
    </div>
  </div>

  <div class="s-section">
    <div class="s-section-title">🔔 Звук и уведомления</div>
    <div class="s-card">
      <a href="/account/settings/sound-notifications" class="s-link">Звук и уведомления <span class="s-arr">›</span></a>
    </div>
  </div>

  <p style="margin-top:8px;font-size:13px;color:#555"><a href="/community" style="color:#C9A84C;text-decoration:none">← В ленту</a></p>
</div>
{% endblock %}
