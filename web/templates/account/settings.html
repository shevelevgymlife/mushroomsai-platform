{% extends "base.html" %}
{% block title %}Настройки — NEUROFUNGI AI{% endblock %}
{% block extra_head %}
<style>
.btn-o{border:1px solid #3dd4e0;color:#3dd4e0;background:transparent;border-radius:12px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-o:hover{background:rgba(61,212,224,.12)}
</style>
{% endblock %}
{% block content %}
<div class="account-wallet-shell" style="max-width:520px;margin:0 auto;padding:16px calc(14px + env(safe-area-inset-right,0px)) calc(24px + env(safe-area-inset-bottom,0px)) calc(14px + env(safe-area-inset-left,0px))">
  <h1 style="font-size:clamp(18px,4.5vw,22px);font-weight:700;color:#e8e8e8;margin:8px 0 20px">Настройки</h1>
  <div style="display:flex;flex-direction:column;gap:12px">
    <a href="/account/profile-edit" class="btn-o" style="width:100%;box-sizing:border-box;text-align:center;padding:14px 18px;text-decoration:none">Редактировать профиль</a>
    <a href="/account/style" class="btn-o" style="width:100%;box-sizing:border-box;text-align:center;padding:14px 18px;text-decoration:none">Настройка стиля</a>
  </div>

  <details class="nf-set-details" open style="margin-top:22px;border-radius:16px;border:1px solid rgba(201,168,76,.28);background:rgba(8,8,8,.85);overflow:hidden">
    <summary style="list-style:none;cursor:pointer;padding:16px 18px;font-weight:700;color:#C9A84C;font-size:16px;user-select:none">🔔 Звук и уведомления</summary>
    <div style="padding:0 18px 20px;border-top:1px solid rgba(255,255,255,.08)">
      <p style="font-size:12px;color:#888;margin:14px 0 12px">Каналы событий в приложении (страница «События»)</p>
      <div class="nf-pref-grid" style="display:flex;flex-direction:column;gap:10px">
        <label class="nf-chk"><input type="checkbox" name="followers" {% if notification_prefs.followers %}checked{% endif %}> Новые подписчики</label>
        <label class="nf-chk"><input type="checkbox" name="likes" {% if notification_prefs.likes %}checked{% endif %}> Лайки</label>
        <label class="nf-chk"><input type="checkbox" name="comments" {% if notification_prefs.comments %}checked{% endif %}> Комментарии</label>
        <label class="nf-chk"><input type="checkbox" name="dm" {% if notification_prefs.dm %}checked{% endif %}> Личные сообщения</label>
        <label class="nf-chk"><input type="checkbox" name="comment_replies" {% if notification_prefs.comment_replies %}checked{% endif %}> Ответы на комментарии</label>
        <label class="nf-chk"><input type="checkbox" name="group_posts" {% if notification_prefs.group_posts %}checked{% endif %}> Публикации в группах</label>
        <label class="nf-chk"><input type="checkbox" name="mentions" {% if notification_prefs.mentions %}checked{% endif %}> Упоминания</label>
        <label class="nf-chk"><input type="checkbox" name="subscription_posts" {% if notification_prefs.subscription_posts %}checked{% endif %}> Новые посты подписок</label>
      </div>
      <hr style="border:none;border-top:1px solid rgba(255,255,255,.1);margin:18px 0">
      <label class="nf-chk"><input type="checkbox" name="telegram_bot" {% if notification_prefs.telegram_bot %}checked{% endif %}> Отправлять в Telegram бот</label>
      <label class="nf-chk" style="margin-top:10px"><input type="checkbox" name="radio_player" {% if notification_prefs.radio_player %}checked{% endif %}> Радио-плеер (Down Tempo и подсказки в интерфейсе)</label>
      <p id="nfPrefSaveMsg" style="display:none;margin-top:12px;font-size:13px;color:#6ee7b7"></p>
      <button type="button" id="nfPrefSaveBtn" class="btn-gold" style="margin-top:16px;width:100%;padding:14px 18px;border-radius:12px;border:1px solid rgba(201,168,76,.5);background:linear-gradient(135deg,rgba(201,168,76,.3),rgba(201,168,76,.12));color:#f5e6c8;font-weight:700;cursor:pointer;font-size:15px">💾 Сохранить настройки</button>
    </div>
  </details>

  <p style="margin-top:24px;font-size:13px;color:#666"><a href="/community" style="color:#3dd4e0;text-decoration:none">← В ленту</a></p>
</div>
<style>
.nf-set-details summary::-webkit-details-marker{display:none}
.nf-chk{display:flex;align-items:center;gap:10px;font-size:14px;color:#d8d8de;cursor:pointer}
.nf-chk input{accent-color:#C9A84C;width:18px;height:18px;flex-shrink:0}
#nfPrefSaveBtn:hover{filter:brightness(1.08)}
</style>
<script>
(function(){
  var btn=document.getElementById('nfPrefSaveBtn');
  var msg=document.getElementById('nfPrefSaveMsg');
  if(!btn)return;
  var keys=['followers','likes','comments','dm','comment_replies','group_posts','mentions','subscription_posts','telegram_bot','radio_player'];
  btn.addEventListener('click',async function(){
    msg.style.display='none';
    var body={};
    keys.forEach(function(k){
      var el=document.querySelector('input[name="'+k+'"]');
      body[k]=!!(el&&el.checked);
    });
    try{
      var r=await fetch('/api/notifications/settings',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(body)});
      var d=await r.json();
      if(d&&d.ok){
        msg.textContent='Сохранено';
        msg.style.color='#6ee7b7';
        msg.style.display='block';
      }else{
        msg.textContent=(d&&d.error)||'Ошибка';
        msg.style.color='#f87171';
        msg.style.display='block';
      }
    }catch(e){
      msg.textContent='Сеть недоступна';
      msg.style.color='#f87171';
      msg.style.display='block';
    }
  });
})();
</script>
{% endblock %}
