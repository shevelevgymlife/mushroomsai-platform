<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MushroomsAI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#080808',
            surface: '#111111',
            border: '#222222',
            gold: '#C9A84C',
            'gold-light': '#E8C96B',
            muted: '#888888',
            text: '#e8e8e8',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/static/css/custom.css" />
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-bg text-text font-sans antialiased min-h-screen">

  <!-- Grain overlay -->
  <div class="grain-overlay"></div>

  {% include "components/navbar.html" %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include "components/footer.html" %}

  <script src="/static/js/app.js"></script>
  {% block extra_scripts %}{% endblock %}
  <script>
  function updateUnreadCount(){
    fetch('/messages/unread-count').then(r=>r.json()).then(data=>{
      const count=data.count||0;
      const badge=document.getElementById('messages-badge');
      if(badge){badge.textContent=count>99?'99+':count;badge.style.display=count>0?'flex':'none';}
      const dashBadge=document.getElementById('dash-messages-badge');
      if(dashBadge){dashBadge.textContent=count>99?'99+':count;dashBadge.style.display=count>0?'flex':'none';}
    }).catch(()=>{});
  }
  setInterval(updateUnreadCount,30000);
  updateUnreadCount();
  </script>
</body>
</html>
