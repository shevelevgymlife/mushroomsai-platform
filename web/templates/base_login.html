<!DOCTYPE html>
<html lang="ru" class="scroll-smooth" style="background:#070708">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>{% block title %}Вход — NEUROFUNGI AI{% endblock %}</title>
  <link rel="icon" href="/static/favicon.svg?v=1" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/tailwind-app.css?v=1" />
  <!-- Telegram WebApp API — обязателен для Mini App initData -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/css/custom.css?v=3" />
  <link rel="stylesheet" href="/static/css/design-system.css?v=3" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { background: #070708; width: 100%; max-width: 100%; overflow-x: hidden; }
    body { overscroll-behavior: none; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-bg text-text font-sans antialiased min-h-screen">
  <div class="grain-overlay"></div>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
