{% extends "base.html" %}
{% block title %}Комментарии — NEUROFUNGI AI{% endblock %}
{% block content %}
<style>
.cpc-root{
  display:flex;
  flex-direction:column;
  box-sizing:border-box;
  height:100vh;
  height:100dvh;
  max-height:100vh;
  max-height:100dvh;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.cpc-top{
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:calc(8px + env(safe-area-inset-top,0px)) 12px 10px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg,rgba(10,12,18,.98),rgba(6,8,14,.94));
}
.cpc-back{
  min-width:44px;min-height:44px;border-radius:12px;border:1px solid rgba(61,212,224,.35);
  background:rgba(12,14,22,.9);color:#9df0ff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.cpc-preview{
  flex:1;min-width:0;
  font-size:13px;color:#c4c8d3;line-height:1.35;
  text-decoration:none;
  display:block;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  border-radius:10px;
  padding:4px 2px;
  margin:-4px -2px;
}
.cpc-preview:hover,.cpc-preview:focus-visible{
  outline:1px solid rgba(61,212,224,.35);
  background:rgba(61,212,224,.06);
}
.cpc-preview strong{color:#e8eaf0;font-size:14px;display:block;margin-bottom:2px}
.cpc-reply-bar{
  flex-shrink:0;
  padding:6px 12px 0;
  font-size:12px;
  color:#7ee8d8;
  display:none;
}
.cpc-reply-bar.on{display:block}
.cpc-composer{
  flex-shrink:0;
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.1);
  background:rgba(6,8,14,.96);
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:8px;
  align-items:center;
}
.cpc-list-scroll{
  flex:1;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  touch-action:pan-y;
  padding:12px 12px calc(20px + env(safe-area-inset-bottom,0px));
  display:flex;
  flex-direction:column;
  gap:10px;
  width:100%;
  box-sizing:border-box;
}
.cpc-row{
  width:100%;
  box-sizing:border-box;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(61,212,224,.18);
  background:linear-gradient(165deg,rgba(255,255,255,.07),rgba(10,12,20,.94));
  box-shadow:0 8px 26px rgba(0,0,0,.38);
}
.cpc-row-meta{
  font-size:11px;color:#8a8fa0;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
}
.cpc-row-meta b{color:#d8deec;font-weight:700}
.cpc-row-reply{font-size:11px;color:#7ee8d8;margin-bottom:6px;line-height:1.35}
.cpc-row-body{font-size:14px;color:#e6e8ef;white-space:pre-wrap;word-break:break-word;line-height:1.5}
.cpc-empty{text-align:center;color:#6b7280;font-size:13px;padding:28px 16px}
.sinp{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#e8e8e8;border-radius:12px;padding:12px 14px;font-size:16px;outline:none;width:100%;box-sizing:border-box}
.btn-g{background:#3dd4e0;color:#000;border:none;border-radius:999px;padding:12px 16px;font-weight:700;cursor:pointer;min-height:44px}
.cpc-reply-btn{
  background:rgba(61,212,224,.12);
  border:1px solid rgba(61,212,224,.4);
  color:#7ee8d8;
  border-radius:8px;
  padding:4px 10px;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
}
</style>
<div class="cpc-root neo-app-surface">
  <div class="cpc-top">
    <button type="button" class="cpc-back" onclick="goBackCpc()" aria-label="Назад">←</button>
    <a class="cpc-preview" href="/community/post/{{ post.id }}?back={{ back_url|urlencode }}" title="Открыть пост целиком">
      <strong>{% if post.title %}{{ post.title }}{% else %}Пост{% endif %}</strong>
      <span>{{ (post.content or '')[:120] }}{% if post.content and post.content|length > 120 %}…{% endif %}</span>
    </a>
  </div>
  <p id="cpcReplyBar" class="cpc-reply-bar">↩ Ответ <span id="cpcReplyName"></span>
    <button type="button" onclick="cpcClearReply()" style="margin-left:8px;background:none;border:none;color:#94a3b8;cursor:pointer;text-decoration:underline;font-size:12px">отмена</button>
  </p>
  <div class="cpc-composer">
    <input id="cpcInp" class="sinp nf-mention-field nf-mention-at-focus" placeholder="Комментарий… @ — подсказки" autocomplete="off">
    <button type="button" class="btn-g" onclick="cpcSend()">Отпр.</button>
  </div>
  <div id="cpcList" class="cpc-list-scroll" role="region" aria-label="Комментарии"></div>
</div>
<script>
const POST_ID={{ post.id }};
const BACK_URL={{ back_url|tojson }};
let __cpcReplyId=null;
function goBackCpc(){
  if(history.length>1){ history.back(); }
  else { location.href=BACK_URL||'/community'; }
}
function cpcClearReply(){
  __cpcReplyId=null;
  var b=document.getElementById('cpcReplyBar');
  if(b){ b.classList.remove('on'); }
}
function cpcSetReply(id, name){
  __cpcReplyId=id;
  var b=document.getElementById('cpcReplyBar');
  var n=document.getElementById('cpcReplyName');
  if(n) n.textContent=name||'';
  if(b) b.classList.add('on');
}
function cpcRowHtml(c){
  var esc=function(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;};
  var body=(typeof linkifyCommunityMentionsPlain==='function')?linkifyCommunityMentionsPlain(c.content||''):esc(c.content||'');
  var reply='';
  if(c.reply_to_name){
    var sn=esc(c.reply_to_snippet||'');
    reply='<div class="cpc-row-reply">↩ '+esc(c.reply_to_name)+(sn?': '+sn:'')+'</div>';
  }
  return '<div class="cpc-row">'+
    '<div class="cpc-row-meta"><span><b>'+esc(c.author_name||'Участник')+'</b> · '+esc(c.created_at||'')+'</span>'+
    '<button type="button" class="cpc-reply-btn" onclick="cpcSetReply('+Number(c.id)+','+JSON.stringify(c.author_name||'Участник')+')">Ответить</button></div>'+
    reply+
    '<div class="cpc-row-body">'+body+'</div></div>';
}
async function cpcLoad(){
  var el=document.getElementById('cpcList');
  if(!el) return;
  el.innerHTML='<div class="cpc-empty">Загрузка…</div>';
  try{
    var r=await fetch('/community/comments/'+POST_ID,{credentials:'same-origin'});
    var d=await r.json().catch(function(){return {};});
    var arr=(d&&d.comments)||[];
    if(!arr.length){
      el.innerHTML='<div class="cpc-empty">Комментариев пока нет — будьте первым.</div>';
      return;
    }
    el.innerHTML=arr.map(cpcRowHtml).join('');
  }catch(e){
    el.innerHTML='<div class="cpc-empty">Не удалось загрузить комментарии</div>';
  }
}
async function cpcSend(){
  var inp=document.getElementById('cpcInp');
  var t=(inp&&inp.value||'').trim();
  if(t.length<1)return;
  var fd=new FormData();
  fd.append('content',t);
  if(__cpcReplyId) fd.append('reply_to_comment_id', String(__cpcReplyId));
  try{
    var r=await fetch('/community/comment/'+POST_ID,{method:'POST',body:fd,credentials:'same-origin'});
    var d=await r.json().catch(function(){return {};});
    if(d&&d.ok){ inp.value=''; cpcClearReply(); await cpcLoad(); }
  }catch(e){}
}
document.getElementById('cpcInp')&&document.getElementById('cpcInp').addEventListener('keydown',function(e){
  if(e.key==='Enter'){ e.preventDefault(); cpcSend(); }
});
cpcLoad();
</script>
{% endblock %}
