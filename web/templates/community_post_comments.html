{% extends "base.html" %}
{% block title %}Комментарии — NEUROFUNGI AI{% endblock %}
{% block content %}
<style>
.cpc-root{
  display:flex;
  flex-direction:column;
  box-sizing:border-box;
  min-height:100vh;
  min-height:100dvh;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.cpc-top{
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:10px;
  padding:calc(8px + env(safe-area-inset-top,0px)) 12px 10px;
  border-bottom:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg,rgba(10,12,18,.98),rgba(6,8,14,.94));
}
.cpc-back{
  min-width:44px;min-height:44px;border-radius:12px;border:1px solid rgba(61,212,224,.35);
  background:rgba(12,14,22,.9);color:#9df0ff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.cpc-preview{
  flex:1;min-width:0;
  font-size:13px;color:#c4c8d3;line-height:1.35;
}
.cpc-preview strong{color:#e8eaf0;font-size:14px;display:block;margin-bottom:2px}
.cpc-chaos-scroll{
  flex:1;
  min-height:min(52vh,480px);
  max-height:calc(100dvh - 200px);
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  touch-action:pan-y;
  padding:14px 8px 120px;
}
.cpc-card{
  margin:16px auto;
  max-width:min(340px,92vw);
  border-radius:12px;
  padding:11px 13px;
  border:1px solid rgba(255,255,255,.12);
  background:linear-gradient(155deg,rgba(255,255,255,.09),rgba(10,12,20,.93));
  box-shadow:0 10px 28px rgba(0,0,0,.4),0 0 0 1px rgba(61,212,224,.06) inset;
  box-sizing:border-box;
}
.cpc-card-meta{font-size:11px;color:#8a8fa0;margin-bottom:6px}
.cpc-card-meta b{color:#d8deec;font-weight:700}
.cpc-card-body{font-size:14px;color:#e6e8ef;white-space:pre-wrap;word-break:break-word;line-height:1.5}
.cpc-foot{
  flex-shrink:0;
  padding:10px 12px calc(12px + env(safe-area-inset-bottom,0px));
  border-top:1px solid rgba(255,255,255,.1);
  background:rgba(6,8,14,.96);
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:8px;
  align-items:center;
}
.cpc-empty{text-align:center;color:#6b7280;font-size:13px;padding:28px 16px}
.sinp{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:#e8e8e8;border-radius:12px;padding:12px 14px;font-size:16px;outline:none;width:100%;box-sizing:border-box}
.btn-g{background:#3dd4e0;color:#000;border:none;border-radius:999px;padding:12px 16px;font-weight:700;cursor:pointer;min-height:44px}
</style>
<div class="cpc-root neo-app-surface">
  <div class="cpc-top">
    <button type="button" class="cpc-back" onclick="goBackCpc()" aria-label="Назад">←</button>
    <div class="cpc-preview">
      <strong>{% if post.title %}{{ post.title }}{% else %}Пост{% endif %}</strong>
      <span>{{ (post.content or '')[:120] }}{% if post.content and post.content|length > 120 %}…{% endif %}</span>
    </div>
  </div>
  <div id="cpcChaos" class="cpc-chaos-scroll" role="region" aria-label="Комментарии"></div>
  <div class="cpc-foot">
    <input id="cpcInp" class="sinp" placeholder="Написать комментарий..." autocomplete="off">
    <button type="button" class="btn-g" onclick="cpcSend()">Отпр.</button>
  </div>
</div>
<script>
const POST_ID={{ post.id }};
const BACK_URL={{ back_url|tojson }};
function goBackCpc(){
  if(history.length>1){ history.back(); }
  else { location.href=BACK_URL||'/community'; }
}
function chaosRot(id){
  var n=(Number(id)||0)*7919+13;
  return ((n%17)-8)*0.95;
}
function chaosTx(id){
  var n=(Number(id)||0)*4177+5;
  return ((n%23)-11)*1.4;
}
function chaosTy(id){
  var n=(Number(id)||0)*6151+7;
  return ((n%9)-4)*2.5;
}
function cpcCardHtml(c){
  var rot=chaosRot(c.id),tx=chaosTx(c.id),ty=chaosTy(c.id);
  var esc=function(s){var d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;};
  return '<div class="cpc-card" style="transform:translate('+tx+'px,'+ty+'px) rotate('+rot+'deg)">'+
    '<div class="cpc-card-meta"><b>'+esc(c.author_name||'Участник')+'</b> · '+esc(c.created_at||'')+
    (c.author_emoji?(' <span style="opacity:.85">'+esc(c.author_emoji)+'</span>'):'')+'</div>'+
    '<div class="cpc-card-body">'+esc(c.content||'')+'</div></div>';
}
async function cpcLoad(){
  var el=document.getElementById('cpcChaos');
  if(!el) return;
  el.innerHTML='<div class="cpc-empty">Загрузка…</div>';
  try{
    var r=await fetch('/community/comments/'+POST_ID,{credentials:'same-origin'});
    var d=await r.json().catch(function(){return {};});
    var arr=(d&&d.comments)||[];
    if(!arr.length){
      el.innerHTML='<div class="cpc-empty">Комментариев пока нет — будьте первым.</div>';
      return;
    }
    el.innerHTML=arr.map(cpcCardHtml).join('');
  }catch(e){
    el.innerHTML='<div class="cpc-empty">Не удалось загрузить комментарии</div>';
  }
}
async function cpcSend(){
  var inp=document.getElementById('cpcInp');
  var t=(inp&&inp.value||'').trim();
  if(t.length<1)return;
  var fd=new FormData();
  fd.append('content',t);
  try{
    var r=await fetch('/community/comment/'+POST_ID,{method:'POST',body:fd,credentials:'same-origin'});
    var d=await r.json().catch(function(){return {};});
    if(d&&d.ok){ inp.value=''; await cpcLoad(); }
  }catch(e){}
}
document.getElementById('cpcInp')&&document.getElementById('cpcInp').addEventListener('keydown',function(e){
  if(e.key==='Enter'){ e.preventDefault(); cpcSend(); }
});
cpcLoad();
</script>
{% endblock %}
