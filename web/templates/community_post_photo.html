{% extends "base.html" %}
{% block title %}Фото поста — MushroomsAI{% endblock %}
{% block content %}
<style>
.pp-wrap{margin:calc(4rem + 8px) auto 0;max-width:1000px;padding:0 10px 14px}
.pp-card{border:1px solid rgba(255,255,255,.14);border-radius:16px;background:#050607;overflow:hidden}
.pp-bar{display:flex;justify-content:flex-end;gap:8px;padding:8px;border-bottom:1px solid rgba(255,255,255,.12);background:rgba(8,10,16,.92)}
.btn-g{background:#3dd4e0;color:#000;border:none;border-radius:10px;padding:9px 12px;font-weight:700;cursor:pointer}
</style>
<div class="pp-wrap">
  <div class="pp-card">
    <div class="pp-bar">
      <button class="btn-g" type="button" onclick="zoomOut()">−</button>
      <button class="btn-g" type="button" onclick="zoomIn()">+</button>
      <button class="btn-g" type="button" onclick="goBack()">Закрыть</button>
    </div>
    <div style="height:calc(var(--vvh,100vh) - 160px);min-height:340px;overflow:auto;touch-action:pan-x pan-y pinch-zoom;background:#000;display:flex;align-items:center;justify-content:center">
      <img id="photoEl" src="{{ post.image_url or '' }}" alt="" style="display:block;max-width:100%;max-height:100%;transform-origin:center center;transform:scale(1);background:#000">
    </div>
  </div>
</div>
<script>
let _z=1;
const BACK_URL={{ back_url|tojson }};
function goBack(){ if(history.length>1){ history.back(); } else { location.href=BACK_URL||'/dashboard#feed'; } }
function zoomIn(){ _z=Math.min(4,_z+0.25); document.getElementById('photoEl').style.transform='scale('+_z+')'; }
function zoomOut(){ _z=Math.max(1,_z-0.25); document.getElementById('photoEl').style.transform='scale('+_z+')'; }
</script>
{% endblock %}
