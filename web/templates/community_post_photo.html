{% extends "base.html" %}
{% block title %}Фото поста — NEUROFUNGI AI{% endblock %}
{% block content %}
<link rel="stylesheet" href="/static/css/nf-community-posts.css?v=4" />
<style>
.pp-wrap{margin:calc(4rem + 8px) auto 0;max-width:1000px;padding:0 10px 14px}
.pp-card{border:1px solid rgba(255,255,255,.14);border-radius:16px;background:#050607;overflow:hidden}
.pp-bar{display:flex;justify-content:flex-end;gap:8px;padding:8px;border-bottom:1px solid rgba(255,255,255,.12);background:rgba(8,10,16,.92)}
.btn-g{background:#3dd4e0;color:#000;border:none;border-radius:10px;padding:9px 12px;font-weight:700;cursor:pointer}
.pp-scroll{height:calc(var(--vvh,100vh) - 160px);min-height:340px;overflow-x:auto;overflow-y:hidden;display:flex;align-items:center;gap:12px;padding:12px;background:#000;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.pp-scroll img{flex:0 0 auto;max-width:min(96vw,900px);max-height:calc(var(--vvh,100vh) - 200px);width:auto;height:auto;object-fit:contain;scroll-snap-align:center;border-radius:12px;background:#000}
</style>
<div class="pp-wrap">
  <div class="pp-card">
    <div class="pp-bar">
      <button class="btn-g" type="button" onclick="goBack()">Закрыть</button>
    </div>
    <div class="pp-scroll">
      {% for u in post_images %}
      <img src="{{ u }}" alt="" loading="lazy">
      {% endfor %}
    </div>
  </div>
</div>
<script>
const BACK_URL={{ back_url|tojson }};
function goBack(){ if(history.length>1){ history.back(); } else { location.href=BACK_URL||'/community'; } }
</script>
{% endblock %}
