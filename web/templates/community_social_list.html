{% extends "base.html" %}
{% block title %}{{ page_title }} — NEUROFUNGI AI{% endblock %}
{% block content %}
<div style="max-width:520px;margin:0 auto;padding:calc(12px + env(safe-area-inset-top,0px)) 14px calc(90px + env(safe-area-inset-bottom,0px))">
  <a href="{{ back_href }}" style="display:inline-block;margin-bottom:16px;color:#888;font-size:13px;text-decoration:none">← Назад</a>
  <h1 style="font-size:20px;font-weight:700;color:#e8e8e8;margin:0 0 18px">{{ page_title }}</h1>
  {% if not people %}
  <p style="color:#666;font-size:14px">Пока никого</p>
  {% else %}
  <div style="display:flex;flex-direction:column;gap:0;border-radius:14px;overflow:hidden;border:1px solid rgba(255,255,255,.08)">
    {% for u in people %}
    <a href="/community/profile/{{ u.id }}" style="display:flex;align-items:center;gap:14px;padding:14px 16px;text-decoration:none;color:inherit;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)">
      <div style="width:48px;height:48px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid rgba(61,212,224,.3);background:#1a1a1a;display:flex;align-items:center;justify-content:center">
        {% if u.avatar %}<img src="{{ u.avatar }}" alt="" style="width:100%;height:100%;object-fit:cover">{% else %}<span style="font-size:20px">🍄</span>{% endif %}
      </div>
      <span style="font-weight:600;font-size:15px;color:#e8e8e8">{{ u.name }}</span>
    </a>
    {% endfor %}
  </div>
  {% endif %}
</div>
{% endblock %}
