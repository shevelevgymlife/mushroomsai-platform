<div id="appActivityPanel" role="dialog" aria-modal="true" aria-labelledby="appActivityTitle" style="display:none">
  <div class="app-act-sheet" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 4px">
      <span id="appActivityTitle" style="font-weight:700;font-size:16px;color:#e8eaef">Уведомления</span>
      <button type="button" class="btn-muted" style="padding:6px 12px;font-size:12px;border:1px solid rgba(255,255,255,.12);color:#888;background:transparent;border-radius:10px;cursor:pointer" onclick="closeAppActivityPanel()">Закрыть</button>
    </div>
    <div id="appActivityList" style="min-height:80px;font-size:13px;color:#888">Загрузка…</div>
    <a href="/notifications" onclick="closeAppActivityPanel()" style="display:block;text-align:center;font-size:12px;color:#3dd4e0;padding:10px 0;margin-top:4px;text-decoration:none;opacity:.8">Все уведомления →</a>
  </div>
</div>
