{% from 'components/stroke_icons.html' import ico %}
{% set eff_uid = user.primary_user_id or user.id %}
<div class="app-mobile-topbar">
  <header class="app-mobile-header-inner neo-app-header app-head-row-grid" aria-label="NEUROFUNGI AI">
    <div class="app-head-left app-head-left--burger-only">
      <button type="button" class="app-head-btn app-head-btn-menu" id="appMobileMenuBtn" title="Меню" aria-label="Открыть меню">
        {{ ico('menu') }}
      </button>
    </div>
    <div class="app-head-center-col">
      <a href="/dashboard#me" class="app-head-brand app-head-brand--center" title="NEUROFUNGI AI">NEUROFUNGI AI</a>
      <span class="app-head-role-stamp{% if user.role == 'admin' %} app-head-role-stamp--admin{% else %} app-head-role-stamp--uch{% endif %}" title="Статус в сообществе">{% if user.role == 'admin' %}Админ{% else %}УЧ{% endif %}</span>
    </div>
    <div class="app-head-actions">
      <a href="/messages" class="app-head-btn app-head-btn-icon" title="Сообщения" aria-label="Сообщения" id="cpMsgHead">
        {{ ico('message') }}
        <span id="cpMsgBadge" class="app-notif-badge">0</span>
      </a>
      <button type="button" class="app-head-btn app-head-btn-icon app-head-bell app-head-likes" id="cpActivityBell" title="Лайки и уведомления" aria-label="Лайки и уведомления">
        {{ ico('heart') }}
        <span id="cpActivityBadge" class="app-notif-badge">0</span>
      </button>
      <a href="/dashboard#me" class="app-head-btn app-head-btn-icon" title="Профиль" aria-label="Профиль" id="cpProfileHead">
        {{ ico('user') }}
      </a>
    </div>
  </header>
</div>
