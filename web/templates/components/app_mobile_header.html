{% from 'components/stroke_icons.html' import ico %}
{% set is_locked_free = ((user.subscription_plan or 'free') == 'free') and ((user.role or 'user') not in ['admin','moderator']) %}
<div class="app-mobile-topbar">
  <header class="app-mobile-header-inner neo-app-header app-head-row-grid app-head-minimal" aria-label="NEUROFUNGI AI">
    <div class="app-head-left app-head-left--burger-only">
      <button type="button" class="app-head-btn app-head-btn-menu" id="appMobileMenuBtn" title="Меню" aria-label="Открыть меню">
        {{ ico('menu') }}
      </button>
    </div>
    <div class="app-head-center-col app-head-brand-wrap">
      {% if is_locked_free %}
      <span class="app-head-brand app-head-brand--center app-head-brand--shimmer nf-shimmer">NEUROFUNGI AI</span>
      {% else %}
      <a href="/community" class="app-head-brand app-head-brand--center app-head-brand--shimmer nf-shimmer" title="NEUROFUNGI AI">NEUROFUNGI AI</a>
      {% endif %}
    </div>
    <div class="app-head-actions app-head-actions--empty" aria-hidden="true"></div>
  </header>
</div>
<style>
.app-head-minimal.neo-app-header.app-mobile-header-inner{grid-template-columns:auto 1fr auto;justify-content:stretch}
.app-head-brand-wrap{width:100%;min-width:0;display:flex;justify-content:center;align-items:center}
.app-head-brand--shimmer{font-size:clamp(13px,3.8vw,18px);font-weight:800;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;padding:0 4px}
.app-head-actions--empty{min-width:44px;visibility:hidden;pointer-events:none}
</style>
