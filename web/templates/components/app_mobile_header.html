{% from 'components/stroke_icons.html' import ico %}
{% set eff_uid = user.primary_user_id or user.id %}
<div class="app-mobile-topbar">
  <header class="app-mobile-header-inner neo-app-header" aria-label="NEUROFUNGI AI">
    <div class="app-head-left">
      <button type="button" class="app-head-btn app-head-btn-menu" id="appMobileMenuBtn" title="Меню" aria-label="Открыть меню">
        {{ ico('menu') }}
      </button>
      <a href="/community/profile/{{ eff_uid }}" class="app-head-brand" title="NEUROFUNGI AI">NEUROFUNGI AI</a>
    </div>
    <div class="app-head-actions">
      <a href="/messages" class="app-head-btn app-head-btn-icon" title="Сообщения" aria-label="Сообщения" id="cpMsgHead">
        {{ ico('message') }}
        <span id="cpMsgBadge" class="app-notif-badge">0</span>
      </a>
      <button type="button" class="app-head-btn app-head-btn-icon app-head-bell" id="cpActivityBell" title="Уведомления" aria-label="Уведомления">
        {{ ico('bell') }}
        <span id="cpActivityBadge" class="app-notif-badge">0</span>
      </button>
      <a href="/community/profile/{{ eff_uid }}" class="app-head-btn app-head-btn-icon" title="Профиль" aria-label="Профиль" id="cpProfileHead">
        {{ ico('user') }}
      </a>
    </div>
  </header>
</div>
