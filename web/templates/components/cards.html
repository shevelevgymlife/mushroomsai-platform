{% macro product_card(product) %}
<div class="group bg-surface border border-border rounded-2xl overflow-hidden hover:border-gold/40 transition-all duration-300 hover:shadow-lg hover:shadow-gold/5">
  {% if product.image_url %}
    <div class="aspect-square overflow-hidden bg-border">
      <img src="{{ product.image_url }}" alt="{{ product.name }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
    </div>
  {% else %}
    <div class="aspect-square bg-gradient-to-br from-gold/10 to-gold/5 flex items-center justify-center">
      <div class="w-16 h-16 rounded-full bg-gold/20 flex items-center justify-center">
        <span class="text-gold text-2xl font-light">M</span>
      </div>
    </div>
  {% endif %}
  <div class="p-5">
    <p class="text-xs text-muted mb-1">{{ product.category or 'Продукт' }}</p>
    <h3 class="font-semibold text-text mb-2 group-hover:text-gold-light transition-colors duration-300">{{ product.name }}</h3>
    <p class="text-sm text-muted line-clamp-2 mb-4">{{ product.description or '' }}</p>
    <div class="flex items-center justify-between">
      <span class="text-gold font-semibold">{{ product.price | int }} руб.</span>
      <a href="/shop/{{ product.id }}" class="text-xs px-3 py-1.5 rounded-lg bg-gold/10 text-gold hover:bg-gold hover:text-bg transition-all duration-300 border border-gold/20">
        Подробнее
      </a>
    </div>
  </div>
</div>
{% endmacro %}
