{# Требует: user, rim_close_fn = 'closeAppGlobalDrawer' | 'closeDbDrawer' #}
{% set rim = user.screen_rim if user.screen_rim is defined else {'on': false, 'r': 61, 'g': 212, 'b': 224, 's': 0.55, 'w': 0.35} %}
<div class="ig-drawer-rim-row">
  <span class="ig-drawer-rim-lbl">Свет</span>
  <div class="ig-drawer-rim-actions">
  <label class="rim-toggle" title="Свечение по краю экрана">
    <input type="checkbox" class="js-drawer-rim-toggle" {% if rim.on %}checked{% endif %} aria-label="Свет по краю экрана" />
    <span class="rim-knob"></span>
  </label>
  <a href="/account/screen-rim" class="rim-palette-shimmer js-rim-palette-link" aria-label="Настройки вида: цвет и ширина"
    {% if rim_close_fn == 'closeDbDrawer' %}onclick="closeDbDrawer();"{% elif rim_close_fn == 'closeAppGlobalDrawer' %}onclick="closeAppGlobalDrawer();"{% endif %}></a>
  </div>
</div>
