<!-- Hero -->
<section class="relative min-h-screen flex items-center justify-center overflow-hidden pt-16">
  <div class="absolute inset-0 bg-gradient-radial from-gold/5 via-transparent to-transparent"></div>
  <div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-gold/5 rounded-full blur-3xl"></div>

  <div class="relative z-10 max-w-4xl mx-auto px-4 text-center">
    <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-gold/30 bg-gold/5 text-gold text-xs font-medium mb-8">
      {{ t.hero_badge }}
    </div>

    <h1 class="text-5xl sm:text-6xl lg:text-7xl font-light text-text leading-tight mb-6">
      {{ t.hero_h1_line1 }}<br />
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-gold to-gold-light font-semibold">{{ t.hero_h1_line2 }}</span>
    </h1>

    <p class="text-lg text-muted max-w-2xl mx-auto mb-10 leading-relaxed">
      {{ t.hero_desc }}
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center">
      <a href="https://t.me/mushrooms_ai_bot" target="_blank" onclick="openBotLink(event)"
         class="px-8 py-4 rounded-xl bg-gold text-bg font-semibold hover:bg-gold-light transition-all duration-300 shadow-lg shadow-gold/20 hover:shadow-gold/30">
        {{ t.btn_open_telegram }}
      </a>
      <a href="/chat" onclick="return guestGuard(event)"
         class="px-8 py-4 rounded-xl border border-border text-text hover:border-gold hover:text-gold transition-all duration-300">
        {{ t.btn_start_consultation }}
      </a>
    </div>
  </div>

  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 animate-bounce">
    <div class="w-5 h-8 rounded-full border border-border flex items-start justify-center pt-1.5">
      <div class="w-1 h-2 bg-muted rounded-full"></div>
    </div>
  </div>
</section>
