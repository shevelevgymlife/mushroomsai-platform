<!-- Hero — асимметричная сетка, панели, те же цвета -->
<section class="relative min-h-[92vh] flex items-center overflow-hidden pt-20 pb-16 lg:pt-24">
  <div class="absolute inset-0 pointer-events-none">
    <div class="absolute top-[12%] right-[-8%] w-[min(520px,90vw)] h-[min(520px,90vw)] rounded-full bg-gold/[0.07] blur-[100px]"></div>
    <div class="absolute bottom-[5%] left-[-10%] w-[min(400px,70vw)] h-[min(400px,70vw)] rounded-full bg-gold-light/[0.05] blur-[90px]"></div>
  </div>

  <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-8 items-center">
      <div class="lg:col-span-7 text-center lg:text-left">
        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-gold/35 bg-gold/[0.07] text-gold text-[11px] font-semibold tracking-wide mb-8">
          <span class="w-1.5 h-1.5 rounded-full bg-gold animate-pulse"></span>
          {{ t.hero_badge }}
        </div>

        <h1 class="font-display text-[2.35rem] sm:text-5xl lg:text-[3.25rem] xl:text-6xl font-semibold text-text leading-[1.08] mb-6 tracking-tight">
          {{ t.hero_h1_line1 }}<br />
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-gold via-gold-light to-gold">{{ t.hero_h1_line2 }}</span>
        </h1>

        <p class="text-base sm:text-lg text-muted max-w-xl mx-auto lg:mx-0 mb-10 leading-relaxed border-l-2 border-gold/40 pl-5 lg:pl-6">
          {{ t.hero_desc }}
        </p>

        <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 justify-center lg:justify-start">
          <a href="https://t.me/mushrooms_ai_bot" target="_blank" onclick="openBotLink(event)"
             class="inline-flex items-center justify-center px-8 py-4 rounded-2xl bg-gold text-bg font-semibold hover:bg-gold-light transition-all duration-300 shadow-[0_0_0_1px_rgba(61,212,224,0.3)] shadow-gold/25 hover:shadow-gold/40">
            {{ t.btn_open_telegram }}
          </a>
          <a href="/chat" onclick="return guestGuard(event)"
             class="inline-flex items-center justify-center px-8 py-4 rounded-2xl border border-gold/25 text-text hover:border-gold/55 hover:bg-gold/[0.06] transition-all duration-300 font-medium">
            {{ t.btn_start_consultation }}
          </a>
        </div>
      </div>

      <div class="lg:col-span-5 relative max-w-md mx-auto lg:max-w-none w-full">
        <div class="relative aspect-square max-h-[420px] lg:max-h-[480px] mx-auto">
          <div class="absolute inset-[8%] rounded-[1.75rem] border border-gold/20 bg-gradient-to-br from-gold/[0.12] to-transparent rotate-[-3deg]"></div>
          <div class="absolute inset-0 panel-rise p-6 sm:p-8 flex flex-col justify-between rotate-[2deg] hover:rotate-0 transition-transform duration-500">
            <div>
              <p class="section-eyebrow mb-2">MushroomsAI</p>
              <p class="font-display text-xl sm:text-2xl text-text font-semibold leading-snug">Протоколы · консультации · сообщество</p>
            </div>
            <div class="space-y-3 pt-6 border-t border-white/[0.06]">
              <div class="flex justify-between items-baseline gap-4">
                <span class="text-xs text-muted uppercase tracking-wider">Фокус</span>
                <span class="text-sm text-gold-light font-medium text-right">Функциональные грибы</span>
              </div>
              <div class="flex justify-between items-baseline gap-4">
                <span class="text-xs text-muted uppercase tracking-wider">Формат</span>
                <span class="text-sm text-text text-right">AI + эксперт · 24/7</span>
              </div>
              <div class="flex justify-between items-baseline gap-4">
                <span class="text-xs text-muted uppercase tracking-wider">Доступ</span>
                <span class="text-sm text-text text-right">Telegram · сайт · кабинет</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="absolute bottom-6 left-1/2 -translate-x-1/2 animate-bounce opacity-60">
    <div class="w-5 h-8 rounded-full border border-gold/30 flex items-start justify-center pt-1.5">
      <div class="w-1 h-2 bg-gold/70 rounded-full"></div>
    </div>
  </div>
</section>
