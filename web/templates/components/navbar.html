<nav class="fixed top-0 left-0 right-0 z-50 border-b border-white/[0.06] glass">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <a href="{% if user %}/community{% else %}/{% endif %}" class="flex items-center gap-3 group no-underline">
        <span class="font-display font-semibold text-lg tracking-tight nf-shimmer">NEUROFUNGI AI</span>
      </a>
      <div class="flex items-center gap-3">
        {% if not user or not user.get('id') %}
          <a href="/login?next=/subscriptions" class="inline-flex items-center gap-2 px-3 py-2 rounded-xl border border-gold/35 bg-gold/[0.08] text-text text-sm font-medium no-underline hover:border-gold hover:bg-gold/15 transition-all duration-300">
            <span class="w-2 h-2 rounded-full bg-gold inline-block"></span>
            Войти
          </a>
        {% endif %}
        <!-- Language switcher -->
        <div class="relative" id="lang-switcher">
          <button onclick="toggleLangMenu(event)"
            class="flex items-center gap-1 px-2 py-1.5 rounded-lg border border-white/[0.08] text-muted hover:border-gold/50 hover:text-text transition-all duration-300 text-sm select-none bg-bg/40"
            title="{{ t.lang_label }}">
            <span>{{ t.langs[lang] if lang in t.langs else '🌐' }}</span>
            <svg class="w-3 h-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          <div id="lang-menu"
            class="hidden absolute right-0 top-full mt-1 w-44 panel-rise shadow-2xl z-50 overflow-hidden py-1">
            {% for code, name in t.langs.items() %}
            <form action="/set-language" method="post" class="m-0 p-0">
              <input type="hidden" name="lang" value="{{ code }}" />
              <button type="submit"
                class="w-full text-left px-3 py-2 text-xs hover:bg-white/[0.04] transition-colors duration-150 {{ 'text-gold font-medium' if code == lang else 'text-muted' }}">
                {{ name }}
              </button>
            </form>
            {% endfor %}
          </div>
        </div>

      </div>
    </div>
  </div>
</nav>

<script>
function toggleLangMenu(e) {
  e.stopPropagation();
  document.getElementById('lang-menu').classList.toggle('hidden');
}
document.addEventListener('click', function() {
  var m = document.getElementById('lang-menu');
  if (m) m.classList.add('hidden');
});
</script>
