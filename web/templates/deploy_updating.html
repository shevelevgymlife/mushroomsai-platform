<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Проект обновляется</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #070708;
      color: #e8e8e8;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      overflow: hidden;
    }
    .screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(1200px 500px at 20% -10%, rgba(61,212,224,.12), transparent 55%),
        radial-gradient(900px 450px at 100% 100%, rgba(255,102,208,.08), transparent 60%),
        #070708;
    }
    .card {
      width: min(760px, 94vw);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 24px;
      background: linear-gradient(165deg, rgba(255,255,255,.08), rgba(10,10,13,.93));
      box-shadow: 0 20px 60px rgba(0,0,0,.5), 0 0 30px rgba(61,212,224,.08);
      padding: clamp(24px, 4vw, 44px);
      text-align: center;
      transform: rotate(-1.2deg);
      position: relative;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 24px;
      pointer-events: none;
      background: linear-gradient(120deg, rgba(61,212,224,.09), transparent 45%, rgba(255,102,208,.07));
    }
    .title {
      margin: 0;
      font-size: clamp(30px, 6vw, 58px);
      line-height: 1.04;
      font-weight: 800;
      letter-spacing: .02em;
      color: #f6f8ff;
      text-shadow: 0 0 18px rgba(61,212,224,.2);
    }
    .sub {
      margin-top: 14px;
      font-size: clamp(14px, 2.6vw, 22px);
      color: #8be9ff;
      font-weight: 700;
    }
    .dots {
      margin: 18px auto 0;
      display: inline-flex;
      gap: 8px;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #3dd4e0;
      opacity: .25;
      animation: blink 1.2s infinite;
    }
    .dot:nth-child(2){ animation-delay: .2s; }
    .dot:nth-child(3){ animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .25; transform: scale(1); }
      40% { opacity: 1; transform: scale(1.12); }
    }
  </style>
</head>
<body>
  <main class="screen">
    <section class="card">
      <h1 class="title">ПРОЕКТ ОБНОВЛЯЕТСЯ</h1>
      <div class="sub">1 МИН.</div>
      <div class="dots" aria-hidden="true">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </section>
  </main>
</body>
</html>
