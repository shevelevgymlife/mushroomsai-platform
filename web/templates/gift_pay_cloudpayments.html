{% extends "base.html" %}
{% block title %}Оплата подарка — NEUROFUNGI AI{% endblock %}
{% block content %}
<div class="neo-app-surface min-h-screen bg-bg pt-28 pb-16 px-4">
  <div class="max-w-md mx-auto text-center">
    <h1 class="text-xl font-semibold text-text mb-2">Оплата подарка</h1>
    <p class="text-sm text-muted mb-6">Тариф «{{ gift_plan_name }}» для пользователя id {{ gift_recipient_id }}. Сумма: {{ gift_amount }} ₽</p>
    <p id="gift-cp-status" class="text-sm text-gold mb-4">Открываем окно оплаты…</p>
    <p class="text-xs text-muted"><a href="/subscriptions" class="text-gold hover:underline">← Назад к подпискам</a></p>
  </div>
</div>
<script src="https://widget.cloudpayments.ru/bundles/cloudpayments.js"></script>
<script>
(function () {
  var pubId = {{ cloudpayments_public_id|tojson }};
  var uid = {{ gift_giver_id|int }};
  var rid = {{ gift_recipient_id|int }};
  var plan = {{ gift_plan|tojson }};
  var amt = {{ gift_amount|int }};
  var pname = {{ gift_plan_name|tojson }};
  var st = document.getElementById('gift-cp-status');
  function fail(msg) {
    if (st) { st.textContent = msg; st.classList.remove('text-gold'); st.classList.add('text-amber-300'); }
  }
  if (!pubId || !amt || amt <= 0 || typeof cp === 'undefined' || !cp.CloudPayments) {
    fail('Виджет CloudPayments не загрузился. Обновите страницу.');
    return;
  }
  var widget = new cp.CloudPayments();
  var inv = 'gift-' + uid + '-' + rid + '-' + plan + '-' + Date.now();
  var gmeta = {
    userId: uid,
    giverId: uid,
    recipientId: rid,
    plan: plan,
    gift: true
  };
  widget.pay('charge', {
    publicId: pubId,
    description: 'Подарок подписки «' + pname + '»',
    amount: Number(amt),
    currency: 'RUB',
    accountId: String(uid),
    invoiceId: inv,
    data: gmeta,
    metadata: gmeta
  }, {
    onSuccess: function () {
      window.location.href = '/subscriptions?paid=1&gifted=1';
    },
    onFail: function (reason) {
      fail('Оплата не прошла: ' + (reason || 'ошибка'));
    }
  });
})();
</script>
{% endblock %}
