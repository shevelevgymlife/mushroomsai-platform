{% extends "base.html" %}
{% block title %}Вход — NEUROFUNGI AI{% endblock %}

{% block extra_head %}
<script src="https://telegram.org/js/telegram-web-app.js"></script>
{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 neo-app-surface" style="padding-top:0;margin-top:-40px">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-gold to-gold-light flex items-center justify-center mx-auto mb-4">
        <span class="text-bg font-bold text-xl">M</span>
      </div>
      <h1 class="text-2xl font-semibold" style="color:#3dd4e0">Войти в NEUROFUNGI AI</h1>
      <p class="text-sm text-muted mt-2">Персональный AI-консультант по грибам</p>
    </div>

    {% if error %}
    <div class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center">
      {{ error }}
    </div>
    {% endif %}

    <div class="flex flex-col gap-3">

      <!-- Telegram: в Mini App — сразу /auth/telegram/webapp; в браузере — deep-link на бота -->
      <a id="tg-login-btn" href="/auth/telegram/open"
        style="display:flex;align-items:center;justify-content:center;gap:12px;width:100%;min-height:52px;padding:0 20px;border-radius:14px;text-decoration:none;background:rgba(38,169,224,.12);border:1.5px solid rgba(38,169,224,.35);color:#29a8e0;font-size:15px;font-weight:600;transition:all .2s"
        onmouseover="this.style.background='rgba(38,169,224,.2)';this.style.borderColor='rgba(38,169,224,.6)'"
        onmouseout="this.style.background='rgba(38,169,224,.12)';this.style.borderColor='rgba(38,169,224,.35)'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.68 7.94c-.12.56-.46.7-.94.44l-2.58-1.9-1.24 1.2c-.14.14-.26.26-.52.26l.18-2.62 4.74-4.28c.2-.18-.04-.28-.32-.1L7.6 14.48l-2.52-.79c-.54-.17-.56-.54.12-.8l9.86-3.8c.46-.16.86.12.58.71z" fill="#29a8e0"/>
        </svg>
        Войти через Telegram
      </a>

      <!-- Google Login -->
      <a id="login-google-btn" href="/auth/google"
        style="display:flex;align-items:center;justify-content:center;gap:12px;width:100%;min-height:52px;padding:0 20px;border-radius:14px;text-decoration:none;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);color:#e8e8e8;font-size:15px;font-weight:500;transition:all .2s"
        onmouseover="this.style.background='rgba(255,255,255,.11)';this.style.borderColor='rgba(255,255,255,.22)'"
        onmouseout="this.style.background='rgba(255,255,255,.06)';this.style.borderColor='rgba(255,255,255,.12)'">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Войти через Google
      </a>

    </div>

  </div>
</div>
<script>
(function () {
  var next = new URLSearchParams(location.search).get("next") || "/dashboard";
  var webappUrl = "/auth/telegram/webapp?next=" + encodeURIComponent(next);
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg && typeof tg.ready === "function") {
    try { tg.ready(); } catch (e) {}
  }
  var g = document.getElementById("login-google-btn");
  if (g && tg) g.style.display = "none";
  var tgBtn = document.getElementById("tg-login-btn");
  if (tgBtn && tg) {
    tgBtn.setAttribute("href", webappUrl);
  }
  var p = location.pathname || "";
  if (tg && (p === "/login" || p === "/login/")) {
    location.replace(webappUrl);
  }
})();
</script>
{% endblock %}
