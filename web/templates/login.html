{% extends "base.html" %}
{% block title %}Вход — MushroomsAI{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center pt-16 px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-10">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-gold to-gold-light flex items-center justify-center mx-auto mb-4">
        <span class="text-bg font-bold text-xl">M</span>
      </div>
      <h1 class="text-2xl font-semibold text-text">Войти в MushroomsAI</h1>
      <p class="text-sm text-muted mt-2">Персональный AI-консультант по грибам</p>
    </div>

    {% if error %}
    <div class="mb-6 p-4 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm text-center">
      {{ error }}
    </div>
    {% endif %}

    <!-- Telegram Login Widget -->
    <div class="mb-4 flex justify-center">
      <script async src="https://telegram.org/js/telegram-widget.js?22"
        data-telegram-login="MushroomsAIbot"
        data-size="large"
        data-auth-url="{{ site_url }}/auth/telegram"
        data-request-access="write">
      </script>
    </div>

    <!-- Google -->
    <a href="/auth/google"
       class="flex items-center justify-center gap-3 w-full p-3.5 rounded-xl border border-border bg-surface text-text text-sm font-medium hover:border-gold/40 transition-all duration-300 mb-6">
      <svg class="w-5 h-5" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Войти через Google
    </a>

    <!-- Divider -->
    <div class="flex items-center gap-4 mb-6">
      <div class="flex-1 h-px bg-border"></div>
      <span class="text-xs text-muted">или email</span>
      <div class="flex-1 h-px bg-border"></div>
    </div>

    <!-- Email login -->
    <form action="/login/email" method="post" class="space-y-4" id="loginForm">
      <div>
        <input type="email" name="email" placeholder="Email" required
          class="w-full px-4 py-3 rounded-xl bg-surface border border-border text-text placeholder-muted text-sm focus:outline-none focus:border-gold/60 transition-colors duration-300" />
      </div>
      <div>
        <input type="password" name="password" placeholder="Пароль" required
          class="w-full px-4 py-3 rounded-xl bg-surface border border-border text-text placeholder-muted text-sm focus:outline-none focus:border-gold/60 transition-colors duration-300" />
      </div>
      <button type="submit"
        class="w-full py-3 rounded-xl bg-gold text-bg font-semibold text-sm hover:bg-gold-light transition-all duration-300">
        Войти
      </button>
    </form>

    <div class="text-center mt-6">
      <p class="text-sm text-muted">Нет аккаунта?
        <button onclick="toggleRegister()" class="text-gold hover:text-gold-light transition-colors">Зарегистрироваться</button>
      </p>
    </div>

    <!-- Register form -->
    <form action="/register/email" method="post" class="space-y-4 mt-6 hidden" id="registerForm">
      <div>
        <input type="text" name="name" placeholder="Ваше имя" required
          class="w-full px-4 py-3 rounded-xl bg-surface border border-border text-text placeholder-muted text-sm focus:outline-none focus:border-gold/60 transition-colors duration-300" />
      </div>
      <div>
        <input type="email" name="email" placeholder="Email" required
          class="w-full px-4 py-3 rounded-xl bg-surface border border-border text-text placeholder-muted text-sm focus:outline-none focus:border-gold/60 transition-colors duration-300" />
      </div>
      <div>
        <input type="password" name="password" placeholder="Пароль (мин. 8 символов)" minlength="8" required
          class="w-full px-4 py-3 rounded-xl bg-surface border border-border text-text placeholder-muted text-sm focus:outline-none focus:border-gold/60 transition-colors duration-300" />
      </div>
      <button type="submit"
        class="w-full py-3 rounded-xl bg-gold text-bg font-semibold text-sm hover:bg-gold-light transition-all duration-300">
        Создать аккаунт
      </button>
      <button type="button" onclick="toggleRegister()" class="w-full text-sm text-muted hover:text-gold transition-colors">
        Назад к входу
      </button>
    </form>
  </div>
</div>

<script>
function toggleRegister() {
  document.getElementById('loginForm').closest('form').classList.toggle('hidden');
  document.getElementById('registerForm').classList.toggle('hidden');
}
</script>
{% endblock %}
