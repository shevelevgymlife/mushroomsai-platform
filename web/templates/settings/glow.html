{% extends "base.html" %}
{% block title %}Подсветка экрана — NEUROFUNGI AI{% endblock %}

{% block content %}
<style>
.glow-page{max-width:420px;margin:0 auto;padding:24px 16px 80px}
.glow-page h1{font-size:20px;font-weight:700;color:#e8e8e8;margin-bottom:4px}
.glow-page .sub{font-size:13px;color:#666;margin-bottom:28px}

/* Color picker canvas */
#glowPickerWrap{position:relative;width:100%;aspect-ratio:1/1;border-radius:16px;overflow:hidden;cursor:crosshair;touch-action:none;margin-bottom:16px;border:1px solid rgba(255,255,255,.1)}
#glowSvCanvas{position:absolute;inset:0;width:100%;height:100%}
#glowPickerThumb{position:absolute;width:22px;height:22px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.6);transform:translate(-50%,-50%);pointer-events:none;transition:border-color .15s}

/* Hue slider */
.glow-slider-wrap{margin-bottom:16px}
.glow-slider-label{font-size:12px;color:#888;margin-bottom:8px;display:flex;justify-content:space-between}
#glowHueSlider{
  -webkit-appearance:none;appearance:none;
  width:100%;height:18px;border-radius:9px;outline:none;cursor:pointer;
  background:linear-gradient(to right,#f00 0%,#ff0 17%,#0f0 33%,#0ff 50%,#00f 67%,#f0f 83%,#f00 100%);
  border:1px solid rgba(255,255,255,.12);
}
#glowHueSlider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid rgba(0,0,0,.3);box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer}
#glowHueSlider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid rgba(0,0,0,.3);box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer}

/* Intensity slider */
#glowIntSlider{
  -webkit-appearance:none;appearance:none;
  width:100%;height:18px;border-radius:9px;outline:none;cursor:pointer;
  background:linear-gradient(to right,rgba(61,212,224,0) 0%,#3dd4e0 100%);
  border:1px solid rgba(255,255,255,.12);
}
#glowIntSlider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid rgba(0,0,0,.3);box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer}
#glowIntSlider::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid rgba(0,0,0,.3);box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer}

/* Preview */
#glowPreviewBox{
  width:100%;height:60px;border-radius:16px;border:2px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);margin-bottom:20px;
  transition:box-shadow .3s;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#666;
}

/* Hex input */
.glow-hex-row{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.glow-hex-swatch{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,255,255,.15);flex-shrink:0}
.glow-hex-inp{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 12px;color:#e8e8e8;font-size:14px;font-family:monospace;outline:none;transition:border-color .2s;text-transform:uppercase}
.glow-hex-inp:focus{border-color:rgba(61,212,224,.5)}

/* Toggle row */
.glow-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding:14px 16px;background:rgba(255,255,255,.04);border-radius:14px;border:1px solid rgba(255,255,255,.08)}
.glow-toggle-row span{font-size:15px;color:#ddd}

/* Back button */
.glow-back{display:inline-flex;align-items:center;gap:8px;color:#3dd4e0;font-size:14px;font-weight:600;text-decoration:none;margin-bottom:20px;padding:8px 0}
.glow-back:hover{color:#fff}
.glow-back svg{flex-shrink:0}
</style>

<div class="glow-page">
  <a href="javascript:history.back()" class="glow-back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Назад
  </a>

  <h1>Подсветка экрана</h1>
  <p class="sub">Настройте цвет и яркость подсветки по периметру</p>

  <!-- On/Off toggle -->
  <div class="glow-toggle-row">
    <span>Подсветка включена</span>
    <label class="glow-sw">
      <input type="checkbox" class="glow-toggle-input" id="glowMainToggle" onchange="window.glowSetEnabled&&glowSetEnabled(this.checked)">
      <span class="glow-sw-track"></span>
    </label>
  </div>

  <!-- HSV color picker square -->
  <div id="glowPickerWrap">
    <canvas id="glowSvCanvas"></canvas>
    <div id="glowPickerThumb"></div>
  </div>

  <!-- Hue slider -->
  <div class="glow-slider-wrap">
    <div class="glow-slider-label"><span>Оттенок</span><span id="glowHueVal">0°</span></div>
    <input type="range" id="glowHueSlider" min="0" max="360" value="0">
  </div>

  <!-- Intensity slider -->
  <div class="glow-slider-wrap">
    <div class="glow-slider-label"><span>Интенсивность</span><span id="glowIntVal">60%</span></div>
    <input type="range" id="glowIntSlider" min="0" max="100" value="60">
  </div>

  <!-- Preview -->
  <div id="glowPreviewBox">предпросмотр подсветки</div>

  <!-- Hex -->
  <div class="glow-hex-row">
    <div class="glow-hex-swatch" id="glowHexSwatch"></div>
    <input type="text" class="glow-hex-inp" id="glowHexInp" maxlength="7" placeholder="#3DD4E0">
  </div>
</div>

<script>
(function () {
  /* ---- HSV utils ---- */
  function hsvToRgb(h, s, v) {
    h = h % 360;
    var i = Math.floor(h / 60), f = h / 60 - i;
    var p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
    var r, g, b;
    switch (i % 6) {
      case 0: r=v;g=t;b=p; break; case 1: r=q;g=v;b=p; break;
      case 2: r=p;g=v;b=t; break; case 3: r=p;g=q;b=v; break;
      case 4: r=t;g=p;b=v; break; case 5: r=v;g=p;b=q; break;
    }
    return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
  }

  function rgbToHex(r, g, b) {
    return '#' + [r,g,b].map(function(x){return x.toString(16).padStart(2,'0')}).join('').toUpperCase();
  }

  function hexToHsv(hex) {
    if (!hex || hex.length < 7) return [185, 0.75, 0.88];
    var r = parseInt(hex.slice(1,3),16)/255;
    var g = parseInt(hex.slice(3,5),16)/255;
    var b = parseInt(hex.slice(5,7),16)/255;
    var max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
    var h = 0, s = max === 0 ? 0 : d/max, v = max;
    if (d !== 0) {
      if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
      else if (max === g) h = ((b - r) / d + 2) / 6;
      else h = ((r - g) / d + 4) / 6;
    }
    return [Math.round(h * 360), s, v];
  }

  function hexToRgba(hex, a) {
    if (!hex || hex.length < 7) return 'rgba(61,212,224,'+a+')';
    var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }

  /* ---- State ---- */
  var hue = 185, sat = 0.75, val = 0.88;
  var intensity = 60;

  /* ---- DOM ---- */
  var canvas    = document.getElementById('glowSvCanvas');
  var wrap      = document.getElementById('glowPickerWrap');
  var thumb     = document.getElementById('glowPickerThumb');
  var hueSlider = document.getElementById('glowHueSlider');
  var intSlider = document.getElementById('glowIntSlider');
  var intVal    = document.getElementById('glowIntVal');
  var hueVal    = document.getElementById('glowHueVal');
  var hexInp    = document.getElementById('glowHexInp');
  var hexSwatch = document.getElementById('glowHexSwatch');
  var preview   = document.getElementById('glowPreviewBox');
  var ctx       = canvas.getContext('2d');

  /* ---- Draw SV canvas ---- */
  function drawCanvas() {
    var W = canvas.width, H = canvas.height;
    // White → hue gradient (left-right)
    var gradH = ctx.createLinearGradient(0, 0, W, 0);
    var rgb = hsvToRgb(hue, 1, 1);
    gradH.addColorStop(0, '#fff');
    gradH.addColorStop(1, 'rgb('+rgb[0]+','+rgb[1]+','+rgb[2]+')');
    ctx.fillStyle = gradH;
    ctx.fillRect(0, 0, W, H);
    // Black gradient top-bottom
    var gradV = ctx.createLinearGradient(0, 0, 0, H);
    gradV.addColorStop(0, 'transparent');
    gradV.addColorStop(1, '#000');
    ctx.fillStyle = gradV;
    ctx.fillRect(0, 0, W, H);
  }

  function resizeCanvas() {
    var rect = wrap.getBoundingClientRect();
    canvas.width  = Math.round(rect.width)  || 300;
    canvas.height = Math.round(rect.height) || 300;
    drawCanvas();
    updateThumbPos();
  }

  /* ---- Thumb position ---- */
  function updateThumbPos() {
    var W = canvas.width, H = canvas.height;
    var tx = sat * W, ty = (1 - val) * H;
    thumb.style.left = tx + 'px';
    thumb.style.top  = ty + 'px';
  }

  /* ---- Update all UI from hue/sat/val/intensity ---- */
  function updateUI() {
    drawCanvas();
    updateThumbPos();
    var rgb = hsvToRgb(hue, sat, val);
    var hex = rgbToHex(rgb[0], rgb[1], rgb[2]);
    hueSlider.value = hue;
    hueVal.textContent = Math.round(hue) + '°';
    hexInp.value = hex;
    hexSwatch.style.background = hex;
    thumb.style.borderColor = val > 0.5 ? '#333' : '#fff';
    updateIntUI();
    updatePreview(hex);
    // Push to glow engine
    if (window.glowSetColor) glowSetColor(hex);
  }

  function updateIntUI() {
    intSlider.value = intensity;
    intVal.textContent = intensity + '%';
    // Recolour the intensity track with current color
    var rgb = hsvToRgb(hue, sat, val);
    var hex = rgbToHex(rgb[0], rgb[1], rgb[2]);
    intSlider.style.background = 'linear-gradient(to right, rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',.05) 0%, rgb('+rgb[0]+','+rgb[1]+','+rgb[2]+') 100%)';
    if (window.glowSetIntensity) glowSetIntensity(intensity);
  }

  function updatePreview(hex) {
    var alpha = (intensity / 100) * 0.85;
    var spread = Math.round(intensity / 14) + 2;
    var blur   = Math.round(intensity / 6) + 10;
    if (intensity > 0 && window.glowIsEnabled && glowIsEnabled()) {
      preview.style.boxShadow = 'inset 0 0 '+blur+'px '+spread+'px '+hexToRgba(hex, alpha);
      preview.style.border = '2px solid ' + hexToRgba(hex, 0.4);
    } else {
      preview.style.boxShadow = 'none';
      preview.style.border = '2px solid rgba(255,255,255,.1)';
    }
  }

  /* ---- Load saved state ---- */
  function loadState() {
    var savedHex = window.glowGetColor ? glowGetColor() : '#3DD4E0';
    var hsv = hexToHsv(savedHex);
    hue = hsv[0]; sat = hsv[1]; val = hsv[2];
    intensity = window.glowGetIntensity ? glowGetIntensity() : 60;
  }

  /* ---- Pointer events on canvas ---- */
  function pickFromEvent(e) {
    var rect = canvas.getBoundingClientRect();
    var px = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    var py = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    sat = Math.max(0, Math.min(1, px / rect.width));
    val = Math.max(0, Math.min(1, 1 - py / rect.height));
    updateUI();
  }

  var dragging = false;
  canvas.addEventListener('mousedown', function(e) { dragging = true; pickFromEvent(e); });
  canvas.addEventListener('touchstart', function(e) { e.preventDefault(); dragging = true; pickFromEvent(e); }, {passive:false});
  document.addEventListener('mousemove', function(e) { if (dragging) pickFromEvent(e); });
  document.addEventListener('touchmove', function(e) { if (dragging) { e.preventDefault(); pickFromEvent(e); } }, {passive:false});
  document.addEventListener('mouseup',   function() { dragging = false; });
  document.addEventListener('touchend',  function() { dragging = false; });

  /* ---- Hue slider ---- */
  hueSlider.addEventListener('input', function() {
    hue = parseFloat(this.value);
    updateUI();
  });

  /* ---- Intensity slider ---- */
  intSlider.addEventListener('input', function() {
    intensity = parseInt(this.value);
    updateIntUI();
    var rgb = hsvToRgb(hue, sat, val);
    updatePreview(rgbToHex(rgb[0], rgb[1], rgb[2]));
  });

  /* ---- Hex input ---- */
  hexInp.addEventListener('input', function() {
    var v = this.value.trim();
    if (v[0] !== '#') v = '#' + v;
    if (/^#[0-9a-fA-F]{6}$/.test(v)) {
      var hsv = hexToHsv(v);
      hue = hsv[0]; sat = hsv[1]; val = hsv[2];
      updateUI();
    }
  });

  /* ---- Init ---- */
  loadState();
  // Wait for layout to settle
  requestAnimationFrame(function() {
    resizeCanvas();
    updateUI();
  });
  window.addEventListener('resize', resizeCanvas);
})();
</script>
{% endblock %}
