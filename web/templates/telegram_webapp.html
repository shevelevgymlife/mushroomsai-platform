{% extends "base.html" %}
{% block title %}Telegram вход — NEUROFUNGI AI{% endblock %}

{% block extra_head %}
<script src="https://telegram.org/js/telegram-web-app.js"></script>
{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center pt-24 px-4 neo-app-surface">
  <div class="w-full max-w-md text-center">
    <h1 class="text-xl font-semibold text-text mb-2">Входим через Telegram...</h1>
    <p class="text-sm text-muted">Подождите секунду</p>
  </div>
</div>

<script src="/static/js/telegram-webapp-auth.js?v=3"></script>
<script>
(function () {
  var next = new URLSearchParams(window.location.search).get("next") || "{{ next_path|e }}";
  window.runTelegramWebAppAuth({
    nextPath: next,
    onError: function (msg) {
      document.body.innerHTML = "<div style=\"padding:24px;font-family:system-ui;color:#f87171;line-height:1.5\">" + msg + "</div>";
    },
    onSuccess: function () {}
  });
})();
</script>
{% endblock %}
